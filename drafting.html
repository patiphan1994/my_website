<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3DNP Drafting | Architecture Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Prompt:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>

    <style>
        :root {
            --bg-canvas: #f2f4f7;
            --bg-panel: #ffffff;
            --text-main: #111827;
            --text-muted: #6b7280;
            --accent: #4f46e5; /* Indigo สไตล์ Rayon/Figma */
            --accent-light: #e0e7ff;
            --border: #e5e7eb;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --wall-color: #374151; /* สีกำแพงทึบ */
        }

        body { margin: 0; font-family: 'Inter', 'Prompt', sans-serif; background: var(--bg-canvas); overflow: hidden; color: var(--text-main); }

        /* --- Grid (1 ช่อง = 1 เมตร / 1000mm) --- */
        .grid-bg {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0;
            background-color: var(--bg-canvas);
            background-image: 
                linear-gradient(rgba(200, 205, 212, 0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(200, 205, 212, 0.3) 1px, transparent 1px);
            background-size: 100px 100px; /* สมมติให้ 100px = 1 เมตร (สเกล 1:10) */
        }

        #canvas-wrapper { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }

        /* --- Top Bar --- */
        .top-bar {
            position: absolute; top: 15px; left: 15px; z-index: 10;
            background: var(--bg-panel); padding: 10px 20px; border-radius: 8px;
            box-shadow: var(--shadow); display: flex; align-items: center; gap: 15px; border: 1px solid var(--border);
        }
        .btn-back { color: var(--text-muted); text-decoration: none; border-right: 1px solid var(--border); padding-right: 15px; transition: 0.2s; }
        .btn-back:hover { color: var(--accent); }
        .file-name { font-weight: 500; font-size: 0.95rem; display: flex; align-items: center; gap: 8px; }
        .scale-badge { background: #f3f4f6; padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; color: var(--text-muted); font-family: monospace; }

        /* --- Toolbar (Left) --- */
        .toolbar {
            position: absolute; left: 15px; top: 50%; transform: translateY(-50%); z-index: 10;
            background: var(--bg-panel); padding: 8px; border-radius: 8px; box-shadow: var(--shadow);
            border: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px;
        }
        .tool-btn {
            width: 40px; height: 40px; border: none; background: transparent; border-radius: 6px; cursor: pointer;
            font-size: 1.1rem; color: var(--text-muted); display: flex; justify-content: center; align-items: center; transition: 0.2s;
        }
        .tool-btn:hover { background: #f3f4f6; color: var(--text-main); }
        .tool-btn.active { background: var(--accent-light); color: var(--accent); }

        /* --- Properties Panel (Right) --- */
        .props-panel {
            position: absolute; right: 15px; top: 15px; bottom: 15px; width: 260px; z-index: 10;
            background: var(--bg-panel); border-radius: 8px; box-shadow: var(--shadow); border: 1px solid var(--border);
            display: flex; flex-direction: column; transform: translateX(300px); transition: transform 0.3s ease;
        }
        .props-panel.open { transform: translateX(0); }
        .panel-header { padding: 15px; border-bottom: 1px solid var(--border); font-weight: 600; font-size: 0.9rem; }
        .panel-body { padding: 15px; overflow-y: auto; flex: 1; }
        
        .prop-group { margin-bottom: 20px; }
        .prop-label { font-size: 0.75rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; margin-bottom: 10px; }
        .input-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .input-box { flex: 1; display: flex; flex-direction: column; position: relative; }
        .input-box label { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 0.75rem; color: var(--text-muted); pointer-events: none; }
        .input-box input {
            width: 100%; padding: 8px 10px 8px 25px; border: 1px solid var(--border); border-radius: 6px;
            font-family: monospace; font-size: 0.85rem; color: var(--text-main); box-sizing: border-box; outline: none;
        }
        .input-box input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-light); }

        /* ลบวัตถุ */
        .btn-delete {
            width: 100%; padding: 10px; background: #fef2f2; color: #ef4444; border: 1px solid #fecaca;
            border-radius: 6px; cursor: pointer; font-weight: 500; transition: 0.2s;
        }
        .btn-delete:hover { background: #fee2e2; }

    </style>
</head>
<body>

    <div class="grid-bg" id="gridBg"></div>

    <div class="top-bar">
        <a href="system.html" class="btn-back"><i class="fas fa-arrow-left"></i></a>
        <div class="file-name"><i class="fas fa-home" style="color: var(--accent);"></i> Modern_House_Plan.dwg</div>
        <div class="scale-badge">1 Grid = 1m</div>
    </div>

    <div class="toolbar">
        <button class="tool-btn active" id="tool-select" onclick="setTool('select')" title="Select (V)"><i class="fas fa-mouse-pointer"></i></button>
        <button class="tool-btn" id="tool-pan" onclick="setTool('pan')" title="Pan Canvas (H)"><i class="fas fa-hand-paper"></i></button>
        <hr style="border-top: 1px solid var(--border); width: 24px; margin: 4px auto;">
        <button class="tool-btn" id="tool-wall" onclick="setTool('wall')" title="Draw Wall (L)"><i class="fas fa-slash"></i></button>
        <button class="tool-btn" id="tool-room" onclick="setTool('room')" title="Draw Room Area (R)"><i class="far fa-square"></i></button>
    </div>

    <div class="props-panel" id="propsPanel">
        <div class="panel-header">Object Properties</div>
        <div class="panel-body">
            
            <div class="prop-group">
                <div class="prop-label">Position & Size (cm)</div>
                <div class="input-row">
                    <div class="input-box"><label>L</label><input type="number" id="propL" onchange="updateObject()"></div>
                    <div class="input-box"><label>T</label><input type="number" id="propT" onchange="updateObject()"></div>
                </div>
                <div class="input-row">
                    <div class="input-box"><label>W</label><input type="number" id="propW" onchange="updateObject()"></div>
                    <div class="input-box"><label>H</label><input type="number" id="propH" onchange="updateObject()"></div>
                </div>
            </div>

            <div class="prop-group">
                <div class="prop-label">Style</div>
                <div class="input-row">
                    <input type="color" id="propColor" style="width:100%; height:35px; border:1px solid #e5e7eb; border-radius:6px; cursor:pointer;" onchange="updateObject()">
                </div>
                <button class="btn-delete" onclick="deleteObject()"><i class="fas fa-trash-alt"></i> Delete Element</button>
            </div>

        </div>
    </div>

    <div id="canvas-wrapper">
        <canvas id="draftCanvas"></canvas>
    </div>

    <script>
        // =====================================
        // 1. INITIALIZE CANVAS
        // =====================================
        const canvas = new fabric.Canvas('draftCanvas', {
            width: window.innerWidth,
            height: window.innerHeight,
            selection: true,
            preserveObjectStacking: true
        });

        // เลื่อนจุดศูนย์กลางกระดานมานิดนึง
        canvas.absolutePan({ x: -100, y: -100 });

        let currentTool = 'select';
        
        // ตัวแปรสำหรับการวาดกำแพง (Line)
        let isDrawingWall = false;
        let tempLine;

        // =====================================
        // 2. PAN & ZOOM (Pan และ Zoom กระดาษ)
        // =====================================
        canvas.on('mouse:wheel', function(opt) {
            var delta = opt.e.deltaY;
            var zoom = canvas.getZoom();
            zoom *= 0.999 ** delta;
            if (zoom > 5) zoom = 5;
            if (zoom < 0.2) zoom = 0.2;
            canvas.zoomToPoint({ x: opt.e.offsetX, y: opt.e.offsetY }, zoom);
            
            // ขยับพื้นหลัง Grid ให้เนียนไปกับการซูม
            document.getElementById('gridBg').style.backgroundSize = `${100 * zoom}px ${100 * zoom}px`;
            document.getElementById('gridBg').style.backgroundPosition = `${canvas.viewportTransform[4]}px ${canvas.viewportTransform[5]}px`;
            
            opt.e.preventDefault();
            opt.e.stopPropagation();
        });

        let isPanning = false;
        let lastPosX, lastPosY;

        canvas.on('mouse:down', function(opt) {
            var evt = opt.e;
            
            // การ Pan กระดาษ (กดปุ่มมือ หรือกด Alt)
            if (currentTool === 'pan' || evt.altKey) {
                isPanning = true;
                canvas.selection = false;
                lastPosX = evt.clientX;
                lastPosY = evt.clientY;
                return;
            }

            // =====================================
            // การวาดกำแพง (Draw Wall) แบบ Rayon
            // =====================================
            if (currentTool === 'wall') {
                isDrawingWall = true;
                var pointer = canvas.getPointer(opt.e);
                var points = [pointer.x, pointer.y, pointer.x, pointer.y];
                
                tempLine = new fabric.Line(points, {
                    strokeWidth: 15, // ความหนากำแพงจำลอง (เช่น 15cm)
                    fill: '#374151',
                    stroke: '#374151',
                    strokeLineCap: 'square',
                    originX: 'center',
                    originY: 'center',
                    selectable: false,
                    evented: false
                });
                canvas.add(tempLine);
            }
        });

        canvas.on('mouse:move', function(opt) {
            // Pan
            if (isPanning) {
                var e = opt.e;
                var vpt = this.viewportTransform;
                vpt[4] += e.clientX - lastPosX;
                vpt[5] += e.clientY - lastPosY;
                this.requestRenderAll();
                lastPosX = e.clientX;
                lastPosY = e.clientY;
                
                // ขยับพื้นหลัง
                var zoom = canvas.getZoom();
                document.getElementById('gridBg').style.backgroundPosition = `${vpt[4]}px ${vpt[5]}px`;
            }

            // วาดเส้นกำแพงตามเมาส์
            if (isDrawingWall && tempLine) {
                var pointer = canvas.getPointer(opt.e);
                
                // ระบบ Snap มุม 90 องศา (กด Shift ค้างเพื่อวาดตรง)
                if (opt.e.shiftKey) {
                    let dx = Math.abs(pointer.x - tempLine.x1);
                    let dy = Math.abs(pointer.y - tempLine.y1);
                    if (dx > dy) { pointer.y = tempLine.y1; } else { pointer.x = tempLine.x1; }
                }

                tempLine.set({ x2: pointer.x, y2: pointer.y });
                canvas.renderAll();
            }
        });

        canvas.on('mouse:up', function(opt) {
            // จบการ Pan
            if (isPanning) {
                this.setViewportTransform(this.viewportTransform);
                isPanning = false;
                if(currentTool === 'select') canvas.selection = true;
            }

            // จบการวาดกำแพง
            if (isDrawingWall) {
                isDrawingWall = false;
                tempLine.setCoords();
                tempLine.set({ selectable: true, evented: true });
                // ถ้าเส้นสั้นเกินไปให้ลบทิ้ง (กันการคลิกพลาด)
                if (Math.abs(tempLine.x1 - tempLine.x2) < 5 && Math.abs(tempLine.y1 - tempLine.y2) < 5) {
                    canvas.remove(tempLine);
                } else {
                    // เลือกเส้นที่เพิ่งวาดเสร็จ
                    setTool('select');
                    canvas.setActiveObject(tempLine);
                }
            }
        });

        // =====================================
        // 3. TOOLBAR ACTIONS
        // =====================================
        function setTool(tool) {
            currentTool = tool;
            document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('tool-' + tool).classList.add('active');
            
            canvas.selection = (tool === 'select');
            canvas.forEachObject(o => o.selectable = (tool === 'select'));
            canvas.defaultCursor = (tool === 'pan') ? 'grab' : (tool === 'wall' ? 'crosshair' : 'default');
            
            // ยกเลิกการเลือกถ้าเปลี่ยนเครื่องมือวาด
            if(tool !== 'select') canvas.discardActiveObject().renderAll();
        }

        // วาดพื้นที่ห้อง (Room Area)
        window.setTool = setTool;
        window.addRoom = function() {
            setTool('select');
            var rect = new fabric.Rect({
                left: canvas.getVpCenter().x, top: canvas.getVpCenter().y,
                width: 400, height: 300, // ห้องขนาด 4x3 เมตร
                fill: 'rgba(79, 70, 229, 0.15)', // สีห้องใสๆ
                stroke: '#4f46e5', strokeWidth: 2, strokeDashArray: [5, 5],
                originX: 'center', originY: 'center',
                cornerColor: '#ffffff', cornerStrokeColor: '#4f46e5', borderColor: '#4f46e5', transparentCorners: false
            });
            canvas.add(rect);
            canvas.setActiveObject(rect);
        };

        // ถ้ากดปุ่ม Room ให้เรียกใช้ addRoom
        document.getElementById('tool-room').onclick = function() { addRoom(); };

        // =====================================
        // 4. PROPERTIES PANEL
        // =====================================
        const panel = document.getElementById('propsPanel');

        canvas.on('selection:created', showProperties);
        canvas.on('selection:updated', showProperties);
        canvas.on('object:modified', showProperties);
        canvas.on('selection:cleared', () => panel.classList.remove('open'));

        function showProperties() {
            const obj = canvas.getActiveObject();
            if(!obj) return;
            
            panel.classList.add('open');
            document.getElementById('propL').value = Math.round(obj.left);
            document.getElementById('propT').value = Math.round(obj.top);
            
            if (obj.type === 'line') {
                // สำหรับเส้นกำแพง ให้โชว์ความยาว(W) และความหนา(H)
                let length = Math.sqrt(Math.pow(obj.x2 - obj.x1, 2) + Math.pow(obj.y2 - obj.y1, 2));
                document.getElementById('propW').value = Math.round(length * obj.scaleX);
                document.getElementById('propH').value = Math.round(obj.strokeWidth * obj.scaleY);
                document.getElementById('propColor').value = obj.stroke;
            } else {
                // สำหรับห้อง
                document.getElementById('propW').value = Math.round(obj.width * obj.scaleX);
                document.getElementById('propH').value = Math.round(obj.height * obj.scaleY);
                // ดึงค่าสี fill และแปลงเป็น hex เพื่อใส่ลง input type="color"
                let c = new fabric.Color(obj.fill).toHex();
                document.getElementById('propColor').value = '#' + c;
            }
        }

        window.updateObject = function() {
            const obj = canvas.getActiveObject();
            if(!obj) return;

            if (obj.type === 'line') {
                obj.set({ stroke: document.getElementById('propColor').value });
                // การเปลี่ยนความยาวเส้นผาน UI อาจจะซับซ้อนไปสำหรับเวอร์ชันนี้ ให้เปลี่ยนสีกับความหนาได้
                obj.set({ strokeWidth: parseFloat(document.getElementById('propH').value) || 15 });
            } else {
                // อัปเดตห้อง
                const newW = parseFloat(document.getElementById('propW').value) || 100;
                const newH = parseFloat(document.getElementById('propH').value) || 100;
                obj.set({
                    left: parseFloat(document.getElementById('propL').value),
                    top: parseFloat(document.getElementById('propT').value),
                    width: newW, height: newH, scaleX: 1, scaleY: 1
                });
                // เซตสีแบบโปร่งแสงให้ห้อง
                let colorHex = document.getElementById('propColor').value;
                let colorRgb = new fabric.Color(colorHex).getSource();
                obj.set({ fill: `rgba(${colorRgb[0]}, ${colorRgb[1]}, ${colorRgb[2]}, 0.15)`, stroke: colorHex, cornerStrokeColor: colorHex, borderColor: colorHex });
            }
            obj.setCoords();
            canvas.requestRenderAll();
        }

        window.deleteObject = function() {
            const obj = canvas.getActiveObject();
            if(obj) { canvas.remove(obj); panel.classList.remove('open'); }
        }

        window.addEventListener('resize', () => { canvas.setWidth(window.innerWidth); canvas.setHeight(window.innerHeight); });

    </script>
</body>
</html>
