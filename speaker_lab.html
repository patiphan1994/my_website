<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speaker Lab | 3D Design</title>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;600&family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <style>
        :root {
            --bg-dark: #000000;
            --panel-bg: rgba(25, 25, 25, 0.8);
            --accent: #ff416c; /* สีส้มอมแดงให้เข้ากับไอคอนแอป */
        }

        body {
            margin: 0; overflow: hidden;
            font-family: 'SF Pro Display', 'Prompt', sans-serif;
            background: var(--bg-dark);
            color: white;
            display: flex;
            height: 100vh;
        }

        /* --- พื้นที่ 3D (ซ้าย) --- */
        #canvas-container {
            flex: 1;
            position: relative;
        }

        /* --- แผงควบคุม (ขวา) --- */
        .control-panel {
            width: 320px;
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .panel-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 5px;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: var(--accent);
        }

        /* ปุ่มกลับหน้าหลัก (สไตล์ Apple) */
        .btn-back {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 45px;
            height: 45px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            text-decoration: none;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: 0.3s;
            z-index: 1000;
        }
        .btn-back:hover {
            background: #fff;
            color: #000;
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <a href="system.html" class="btn-back" title="Back to OS"><i class="fas fa-arrow-left"></i></a>

    <div id="canvas-container"></div>

    <div class="control-panel">
        <div class="panel-title"><i class="fas fa-cube"></i> Enclosure Size</div>
        
        <div class="input-group">
            <label>Width (กว้าง) [cm]</label>
            <input type="number" id="boxW" value="40" oninput="updateBox()">
        </div>
        <div class="input-group">
            <label>Height (สูง) [cm]</label>
            <input type="number" id="boxH" value="60" oninput="updateBox()">
        </div>
        <div class="input-group">
            <label>Depth (ลึก) [cm]</label>
            <input type="number" id="boxD" value="35" oninput="updateBox()">
        </div>

        <hr style="border-color: rgba(255,255,255,0.1); margin: 20px 0;">

        <div class="panel-title"><i class="fas fa-calculator"></i> Internal Volume</div>
        <div style="background: rgba(0,0,0,0.5); padding: 15px; border-radius: 8px; text-align: center;">
            <span id="volumeCalc" style="font-size: 1.5rem; font-weight: 600;">84.0</span> <span style="color:#888;">Liters</span>
        </div>
    </div>

    <script>
        // 1. ตั้งค่าพื้นฐาน Scene, Camera, Renderer
        const scene = new THREE.Scene();
        // ใส่สีพื้นหลังให้ดูมีมิติ
        scene.background = new THREE.Color(0x1a1a1a);
        
        const camera = new THREE.PerspectiveCamera(75, (window.innerWidth - 320) / window.innerHeight, 0.1, 1000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth - 320, window.innerHeight); // เว้นที่ให้แผงควบคุม 320px
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // 2. เพิ่มการควบคุม (หมุน/ซูม) ด้วยเมาส์
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        camera.position.set(60, 60, 100);
        controls.update();

        // 3. จัดแสง (Lighting)
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6); // แสงรอบทิศทาง
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8); // แสงไฟส่องลงมา
        directionalLight.position.set(50, 100, 50);
        scene.add(directionalLight);

        // 4. สร้างวัสดุตู้ลำโพง (Material)
        const material = new THREE.MeshStandardMaterial({ 
            color: 0x8b5a2b, // สีไม้ (Brown)
            roughness: 0.8,
            metalness: 0.2
        });
        
        // เพิ่มเส้นขอบ (Wireframe) ให้ดูชัดขึ้น
        const edgesMaterial = new THREE.LineBasicMaterial({ color: 0xffffff, linewidth: 2 });

        // ตัวแปรเก็บกล่องและเส้นขอบ
        let boxMesh, boxEdges;

        // ฟังก์ชันสร้างและอัปเดตขนาดกล่อง
        function updateBox() {
            // ลบกล่องเก่าออกก่อน
            if (boxMesh) scene.remove(boxMesh);
            if (boxEdges) scene.remove(boxEdges);

            // ดึงค่าจากช่อง Input
            const w = parseFloat(document.getElementById('boxW').value) || 1;
            const h = parseFloat(document.getElementById('boxH').value) || 1;
            const d = parseFloat(document.getElementById('boxD').value) || 1;

            // สร้างรูปทรงเรขาคณิตใหม่ (Geometry)
            const geometry = new THREE.BoxGeometry(w, h, d);
            
            // สร้าง Mesh (กล่องทึบ)
            boxMesh = new THREE.Mesh(geometry, material);
            scene.add(boxMesh);

            // สร้างเส้นขอบ (Edges)
            const edges = new THREE.EdgesGeometry(geometry);
            boxEdges = new THREE.LineSegments(edges, edgesMaterial);
            scene.add(boxEdges);

            // คำนวณปริมาตร (กว้าง x ยาว x สูง) / 1000 = ลิตร (Liters)
            const volumeLiters = (w * h * d) / 1000;
            document.getElementById('volumeCalc').innerText = volumeLiters.toFixed(2);
        }

        // เรียกใช้ครั้งแรกเพื่อวาดกล่อง
        updateBox();

        // เพิ่มตารางตาราง (Grid Helper) ให้ดูเหมือนโปรแกรมออกแบบ
        const gridHelper = new THREE.GridHelper(200, 20, 0x444444, 0x222222);
        gridHelper.position.y = - (document.getElementById('boxH').value / 2); // ให้อยู่ใต้ฐานกล่อง
        scene.add(gridHelper);

        // 5. ลูปการเรนเดอร์ (Animation Loop)
        function animate() {
            requestAnimationFrame(animate);
            controls.update(); // อัปเดตการหมุนเมาส์
            renderer.render(scene, camera);
        }
        animate();

        // 6. ปรับขนาดหน้าจอเมื่อย่อขยายเบราว์เซอร์
        window.addEventListener('resize', () => {
            const newWidth = window.innerWidth - 320;
            camera.aspect = newWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(newWidth, window.innerHeight);
        });

    </script>
</body>
</html>
