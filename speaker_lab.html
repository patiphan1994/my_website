<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3DNP Acoustic CAD | Professional Suite</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg-app: #1e1e1e; /* ธีมมืดแบบโปรแกรม CAD มืออาชีพ (AutoCAD/Blender) */
            --bg-panel: #252526;
            --border: #333333;
            --text-main: #cccccc;
            --accent: #007fd4; /* VS Code Blue */
            --tool-hover: #3a3d41;
        }

        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-app); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* --- TOP MENU BAR --- */
        .top-bar { height: 40px; background: #333; display: flex; align-items: center; padding: 0 15px; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
        .menu-item { margin-right: 20px; cursor: pointer; transition: 0.2s; }
        .menu-item:hover { color: #fff; }

        /* --- MAIN WORKSPACE --- */
        .workspace { display: flex; flex: 1; height: calc(100vh - 300px); }

        /* 1. Left Toolbar (CAD Tools) */
        .toolbar-left { width: 50px; background: var(--bg-panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding-top: 10px; gap: 5px; }
        .tool-btn { width: 35px; height: 35px; border-radius: 5px; border: none; background: transparent; color: var(--text-main); cursor: pointer; display: flex; justify-content: center; align-items: center; transition: 0.2s; }
        .tool-btn:hover { background: var(--tool-hover); color: #fff; }
        .tool-btn.active { background: var(--accent); color: #fff; }

        /* 2. 3D Viewport */
        .viewport-3d { flex: 1; position: relative; background: #1e1e1e; }
        #canvas-container { width: 100%; height: 100%; outline: none; }
        
        /* 3. Right Panel (Properties) */
        .panel-right { width: 320px; background: var(--bg-panel); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; }
        .panel-section { border-bottom: 1px solid var(--border); }
        .section-header { padding: 10px 15px; background: #2d2d2d; font-size: 0.8rem; font-weight: 600; cursor: pointer; text-transform: uppercase; color: #aaa; }
        .section-content { padding: 15px; }

        .form-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .form-row label { font-size: 0.8rem; color: #999; }
        .form-row input { width: 80px; background: #3c3c3c; border: 1px solid #555; color: #fff; padding: 5px; border-radius: 3px; outline: none; font-family: monospace; text-align: right; }
        .form-row input:focus { border-color: var(--accent); }

        /* --- BOTTOM PANEL (DSP & GRAPH) --- */
        .panel-bottom { height: 260px; background: var(--bg-panel); border-top: 1px solid var(--border); display: flex; }
        
        /* 4. DSP EQ Section */
        .dsp-section { width: 50%; padding: 15px; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .eq-rack { display: flex; justify-content: space-around; flex: 1; margin-top: 15px; }
        .eq-band { display: flex; flex-direction: column; align-items: center; }
        .eq-band label { font-size: 0.7rem; color: #888; margin-bottom: 5px; }
        .eq-slider { -webkit-appearance: slider-vertical; width: 8px; height: 120px; outline: none; }
        .eq-val { font-size: 0.75rem; margin-top: 5px; font-family: monospace; color: var(--accent); }

        /* 5. Acoustic Graph */
        .graph-section { width: 50%; padding: 15px; position: relative; }
        
    </style>
</head>
<body>

    <div class="top-bar">
        <a href="system.html" style="color: var(--text-main); text-decoration: none; margin-right: 20px;"><i class="fas fa-arrow-left"></i> Back</a>
        <div class="menu-item">File</div>
        <div class="menu-item">Edit</div>
        <div class="menu-item">Acoustics</div>
        <div class="menu-item">Tools</div>
    </div>

    <div class="workspace">
        <div class="toolbar-left">
            <button class="tool-btn" title="Select (Space)"><i class="fas fa-mouse-pointer"></i></button>
            <button class="tool-btn active" title="Draw Box (R)"><i class="fas fa-cube"></i></button>
            <button class="tool-btn" title="Push/Pull (P)"><i class="fas fa-level-up-alt"></i></button>
            <button class="tool-btn" title="Tape Measure (T)"><i class="fas fa-ruler-combined"></i></button>
            <hr style="width: 30px; border-color: #444; margin: 10px 0;">
            <button class="tool-btn" title="Orbit (O)"><i class="fas fa-sync-alt"></i></button>
            <button class="tool-btn" title="Pan (H)"><i class="fas fa-hand-paper"></i></button>
        </div>

        <div class="viewport-3d">
            <div id="canvas-container"></div>
        </div>

        <div class="panel-right">
            <div class="panel-section">
                <div class="section-header">Enclosure Properties</div>
                <div class="section-content">
                    <div class="form-row"><label>Volume (Vb) [L]</label><input type="number" id="v_vol" value="80" oninput="simAudio()"></div>
                    <div class="form-row"><label>Tuning (Fb) [Hz]</label><input type="number" id="v_fb" value="45" oninput="simAudio()"></div>
                    <div class="form-row"><label>Wood Thick [mm]</label><input type="number" value="18"></div>
                </div>
            </div>
            
            <div class="panel-section">
                <div class="section-header">Driver T/S Params</div>
                <div class="section-content">
                    <div class="form-row"><label>Fs [Hz]</label><input type="number" id="v_fs" value="40" oninput="simAudio()"></div>
                    <div class="form-row"><label>Qts</label><input type="number" id="v_qts" value="0.4" step="0.01" oninput="simAudio()"></div>
                    <div class="form-row"><label>Vas [L]</label><input type="number" value="100"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="panel-bottom">
        <div class="dsp-section">
            <div style="font-size: 0.85rem; font-weight: 600; color: #fff;"><i class="fas fa-sliders-h"></i> PARAMETRIC EQ & CROSSOVER</div>
            <div class="eq-rack">
                <div class="eq-band">
                    <label>40Hz</label>
                    <input type="range" class="eq-slider" id="eq1" min="-12" max="12" value="0" step="0.5" oninput="updateEQ()">
                    <div class="eq-val" id="val_eq1">0 dB</div>
                </div>
                <div class="eq-band">
                    <label>80Hz</label>
                    <input type="range" class="eq-slider" id="eq2" min="-12" max="12" value="0" step="0.5" oninput="updateEQ()">
                    <div class="eq-val" id="val_eq2">0 dB</div>
                </div>
                <div class="eq-band">
                    <label>160Hz</label>
                    <input type="range" class="eq-slider" id="eq3" min="-12" max="12" value="0" step="0.5" oninput="updateEQ()">
                    <div class="eq-val" id="val_eq3">0 dB</div>
                </div>
                <div class="eq-band">
                    <label>LPF (Hz)</label>
                    <input type="range" class="eq-slider" id="lpf" min="60" max="250" value="120" step="5" oninput="updateEQ()">
                    <div class="eq-val" id="val_lpf" style="color: #ff9f0a;">120 Hz</div>
                </div>
            </div>
        </div>
        
        <div class="graph-section">
            <div style="position: absolute; top: 10px; left: 15px; font-size: 0.8rem; color: #888; z-index: 10;">SPL Response (Including DSP)</div>
            <canvas id="splChart"></canvas>
        </div>
    </div>

    <script>
        // --- 1. SETTING UP SKETCHUP-LIKE MOUSE CONTROLS ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1e1e1e);
        scene.add(new THREE.GridHelper(200, 40, 0x444444, 0x2a2a2a));

        const camera = new THREE.PerspectiveCamera(50, document.getElementById('canvas-container').clientWidth / document.getElementById('canvas-container').clientHeight, 0.1, 1000);
        camera.position.set(80, 60, 100);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(document.getElementById('canvas-container').clientWidth, document.getElementById('canvas-container').clientHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const orbit = new THREE.OrbitControls(camera, renderer.domElement);
        // ทำให้เมาส์เหมือน SketchUp มากที่สุด
        orbit.mouseButtons = {
            LEFT: THREE.MOUSE.ROTATE, // คลิกซ้าย (หรือขวา แล้วแต่ถนัด) เพื่อหมุน
            MIDDLE: THREE.MOUSE.DOLLY, // ลูกกลิ้งเพื่อซูม
            RIGHT: THREE.MOUSE.PAN // คลิกขวาเพื่อเลื่อนกล้อง
        };

        // ใส่ไฟ
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        const light = new THREE.DirectionalLight(0xffffff, 0.8);
        light.position.set(50, 100, 50);
        scene.add(light);

        // กล่องจำลอง
        const geo = new THREE.BoxGeometry(40, 60, 35);
        const mat = new THREE.MeshStandardMaterial({ color: 0x8b5a2b });
        const box = new THREE.Mesh(geo, mat);
        box.position.y = 30;
        scene.add(box);

        const edges = new THREE.EdgesGeometry(geo);
        const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x000000 }));
        box.add(line);

        function animate() { requestAnimationFrame(animate); orbit.update(); renderer.render(scene, camera); }
        animate();

        // --- 2. SETTING UP DSP GRAPH ---
        const ctx = document.getElementById('splChart').getContext('2d');
        const splChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array.from({length: 60}, (_, i) => 20 + (i * 3)), // 20 - 200Hz
                datasets: [{
                    label: 'SPL', data: [], borderColor: '#007fd4', backgroundColor: 'rgba(0, 127, 212, 0.2)', borderWidth: 2, tension: 0.3, fill: true, pointRadius: 0
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                scales: {
                    x: { type: 'logarithmic', grid: { color: '#333' }, ticks: { color: '#888' } },
                    y: { grid: { color: '#333' }, ticks: { color: '#888' }, min: -30, max: 15 }
                },
                plugins: { legend: { display: false } }
            }
        });

        // --- 3. ACOUSTIC & DSP CALCULATION ---
        let eqVals = [0, 0, 0];
        let lpfVal = 120;

        function updateEQ() {
            eqVals[0] = parseFloat(document.getElementById('eq1').value);
            eqVals[1] = parseFloat(document.getElementById('eq2').value);
            eqVals[2] = parseFloat(document.getElementById('eq3').value);
            lpfVal = parseFloat(document.getElementById('lpf').value);

            document.getElementById('val_eq1').innerText = (eqVals[0]>0?'+':'') + eqVals[0] + ' dB';
            document.getElementById('val_eq2').innerText = (eqVals[1]>0?'+':'') + eqVals[1] + ' dB';
            document.getElementById('val_eq3').innerText = (eqVals[2]>0?'+':'') + eqVals[2] + ' dB';
            document.getElementById('val_lpf').innerText = lpfVal + ' Hz';

            simAudio(); // คำนวณกราฟใหม่เมื่อหมุน EQ
        }

        function simAudio() {
            const fb = parseFloat(document.getElementById('v_fb').value) || 40;
            const freqs = splChart.data.labels;
            
            const splData = freqs.map(f => {
                // 1. Base Box Simulation (Roll-off)
                const fn = f / fb;
                const fn4 = Math.pow(fn, 4);
                let mag = 10 * Math.log10(fn4 / (Math.pow(fn4 - 1, 2) + fn4)); 
                
                // 2. Apply DSP EQ (จำลอง Bell Filter)
                if(f >= 20 && f <= 60) mag += eqVals[0] * Math.exp(-Math.pow(f-40, 2)/400); // 40Hz Band
                if(f >= 60 && f <= 110) mag += eqVals[1] * Math.exp(-Math.pow(f-80, 2)/600); // 80Hz Band
                if(f >= 110 && f <= 200) mag += eqVals[2] * Math.exp(-Math.pow(f-160, 2)/800); // 160Hz Band
                
                // 3. Apply Low Pass Filter (Crossover)
                if(f > lpfVal) {
                    mag -= (f - lpfVal) * 0.3; // 12dB/octave slope approx
                }

                return Math.max(-30, mag);
            });
            
            splChart.data.datasets[0].data = splData;
            splChart.update();
        }

        updateEQ(); // เริ่มต้น

        window.addEventListener('resize', () => {
            const c = document.getElementById('canvas-container');
            camera.aspect = c.clientWidth / c.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(c.clientWidth, c.clientHeight);
        });

    </script>
</body>
</html>
