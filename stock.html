<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการสต๊อกและเครื่องมือ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .item-img { width: 50px; height: 50px; object-fit: cover; border-radius: 5px; }
        
        /* จัดให้อยู่ตรงกลางสำหรับหน้า Login */
        #login-section { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        
        /* ซ่อนหน้าระบบสต๊อกไว้ก่อนจนกว่าจะล็อคอิน */
        #app-section { display: none; }
    </style>
</head>
<body>

<div id="login-section">
    <div class="card p-5" style="width: 100%; max-width: 400px;">
        <h3 class="text-center mb-4">🔒 เข้าสู่ระบบสต๊อก</h3>
        <form id="login-form">
            <div class="mb-3">
                <label class="form-label">ชื่อผู้ใช้งาน</label>
                <input type="text" id="login-username" class="form-control" required placeholder="ใส่ username">
            </div>
            <div class="mb-4">
                <label class="form-label">รหัสผ่าน</label>
                <input type="password" id="login-password" class="form-control" required placeholder="ใส่ password">
            </div>
            <button type="submit" class="btn btn-primary w-100">เข้าสู่ระบบ</button>
            <p id="login-error" class="text-danger mt-3 text-center" style="display: none;">ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง!</p>
        </form>
    </div>
</div>

<div id="app-section" class="container my-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>📦 ระบบจัดการสต๊อกวัสดุ & เครื่องมือ</h2>
        <button id="logout-btn" class="btn btn-outline-danger">ออกจากระบบ</button>
    </div>
    
    <div class="row g-4">
        <div class="col-md-4">
            <div class="card p-4 mb-4">
                <h4 class="card-title text-success mb-3">➕ รับของเข้าสต๊อก</h4>
                <form id="add-item-form">
                    <div class="mb-3">
                        <label class="form-label">ชื่อวัสดุ / เครื่องมือ</label>
                        <input type="text" id="add-name" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">ประเภท</label>
                        <select id="add-type" class="form-select">
                            <option value="วัสดุสิ้นเปลือง">วัสดุสิ้นเปลือง</option>
                            <option value="เครื่องมือ">เครื่องมือ/อุปกรณ์</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">จำนวนที่รับเข้า</label>
                        <input type="number" id="add-qty" class="form-control" min="1" value="1" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">รูปภาพสินค้า</label>
                        <input type="file" id="add-image" class="form-control" accept="image/*" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100">📥 บันทึกรับเข้า</button>
                </form>
            </div>

            <div class="card p-4">
                <h4 class="card-title text-danger mb-3">📤 เบิกไปใช้งาน</h4>
                <form id="withdraw-form">
                    <div class="mb-3">
                        <label class="form-label">เลือกของที่จะเบิก</label>
                        <select id="withdraw-item-id" class="form-select" required></select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">จำนวนที่เบิก</label>
                        <input type="number" id="withdraw-qty" class="form-control" min="1" value="1" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">ชื่องาน / ลูกค้า</label>
                        <input type="text" id="withdraw-customer" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-danger w-100">📤 ยืนยันการเบิก</button>
                </form>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card p-4 mb-4">
                <h4 class="mb-3">📊 รายการสินค้าในคลังปัจจุบัน</h4>
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-dark">
                            <tr>
                                <th>รูปภาพ</th>
                                <th>ชื่อสินค้า</th>
                                <th>ประเภท</th>
                                <th>คงเหลือ</th>
                            </tr>
                        </thead>
                        <tbody id="stock-table-body"></tbody>
                    </table>
                </div>
            </div>

            <div class="card p-4">
                <h4 class="mb-3 text-secondary">📜 ประวัติการทำรายการ</h4>
                <div class="table-responsive">
                    <table class="table table-sm table-striped">
                        <thead>
                            <tr>
                                <th>เวลา</th>
                                <th>ประเภท</th>
                                <th>รายการ</th>
                                <th>จำนวน</th>
                                <th>ลูกค้า / หมายเหตุ</th>
                            </tr>
                        </thead>
                        <tbody id="history-table-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// ================= ระบบ Login =================
const VALID_USERNAME = "admin";
const VALID_PASSWORD = "123456";

const loginSection = document.getElementById('login-section');
const appSection = document.getElementById('app-section');
const loginError = document.getElementById('login-error');

// เช็คว่าเคยล็อคอินไว้ในเซสชันนี้หรือยัง (รีเฟรชหน้าเว็บจะได้ไม่ต้องล็อกอินใหม่)
if(sessionStorage.getItem('isLoggedIn') === 'true') {
    showApp();
}

document.getElementById('login-form').addEventListener('submit', function(e) {
    e.preventDefault();
    const user = document.getElementById('login-username').value;
    const pass = document.getElementById('login-password').value;

    if(user === VALID_USERNAME && pass === VALID_PASSWORD) {
        sessionStorage.setItem('isLoggedIn', 'true');
        showApp();
    } else {
        loginError.style.display = 'block';
    }
});

document.getElementById('logout-btn').addEventListener('click', function() {
    sessionStorage.removeItem('isLoggedIn');
    loginSection.style.display = 'flex';
    appSection.style.display = 'none';
    document.getElementById('login-form').reset();
});

function showApp() {
    loginSection.style.display = 'none';
    appSection.style.display = 'block';
    renderStock();
    renderHistory();
}

// ================= ระบบจัดการสต๊อก (เหมือนเดิม) =================
let stockItems = JSON.parse(localStorage.getItem('stockItems')) || [];
let historyLogs = JSON.parse(localStorage.getItem('historyLogs')) || [];

function getBase64(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
    });
}

function renderStock() {
    const tableBody = document.getElementById('stock-table-body');
    const selectWithdraw = document.getElementById('withdraw-item-id');
    tableBody.innerHTML = '';
    selectWithdraw.innerHTML = '<option value="">-- เลือกของที่ต้องการเบิก --</option>';
    
    if(stockItems.length === 0) {
        tableBody.innerHTML = `<tr><td colspan="4" class="text-center text-muted">ยังไม่มีของในสต๊อก</td></tr>`;
    }

    stockItems.forEach(item => {
        tableBody.innerHTML += `
            <tr>
                <td><img src="${item.image}" class="item-img" alt="${item.name}"></td>
                <td><strong>${item.name}</strong></td>
                <td><span class="badge ${item.type === 'เครื่องมือ' ? 'bg-primary' : 'bg-info'}">${item.type}</span></td>
                <td><span class="fs-5 ${item.qty <= 0 ? 'text-danger' : 'text-success'}">${item.qty}</span></td>
            </tr>
        `;
        if(item.qty > 0) {
            selectWithdraw.innerHTML += `<option value="${item.id}">${item.name} (เหลือ: ${item.qty})</option>`;
        }
    });
}

function renderHistory() {
    const historyBody = document.getElementById('history-table-body');
    historyBody.innerHTML = '';
    if(historyLogs.length === 0) {
        historyBody.innerHTML = `<tr><td colspan="5" class="text-center text-muted">ยังไม่มีประวัติรายการ</td></tr>`;
    }
    [...historyLogs].reverse().forEach(log => {
        historyBody.innerHTML += `
            <tr>
                <td><small>${log.time}</small></td>
                <td><span class="badge ${log.action === 'IN' ? 'bg-success' : 'bg-danger'}">${log.action === 'IN' ? 'รับเข้า' : 'เบิกออก'}</span></td>
                <td>${log.itemName}</td>
                <td>${log.qty}</td>
                <td><span class="text-primary">${log.customer}</span></td>
            </tr>
        `;
    });
}

function saveData() {
    localStorage.setItem('stockItems', JSON.stringify(stockItems));
    localStorage.setItem('historyLogs', JSON.stringify(historyLogs));
    renderStock();
    renderHistory();
}

document.getElementById('add-item-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const name = document.getElementById('add-name').value;
    const type = document.getElementById('add-type').value;
    const qty = parseInt(document.getElementById('add-qty').value);
    const imgFile = document.getElementById('add-image').files[0];
    
    const base64Img = await getBase64(imgFile);
    const now = new Date().toLocaleString('th-TH');

    let existingItem = stockItems.find(item => item.name.toLowerCase() === name.toLowerCase());

    if(existingItem) {
        existingItem.qty += qty;
        existingItem.image = base64Img;
    } else {
        stockItems.push({ id: Date.now().toString(), name: name, type: type, qty: qty, image: base64Img });
    }

    historyLogs.push({ time: now, action: 'IN', itemName: name, qty: qty, customer: 'ซื้อเข้าคลังสินค้าทั่วไป' });
    saveData();
    document.getElementById('add-item-form').reset();
    alert('บันทึกรับของเข้าคลังเรียบร้อยครับ!');
});

document.getElementById('withdraw-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const itemId = document.getElementById('withdraw-item-id').value;
    const qty = parseInt(document.getElementById('withdraw-qty').value);
    const customer = document.getElementById('withdraw-customer').value;
    const now = new Date().toLocaleString('th-TH');
    const item = stockItems.find(i => i.id === itemId);
    
    if(!item) return;
    if(item.qty < qty) {
        alert('❌ ไม่สามารถเบิกได้เนื่องจากของในคลังมีไม่เพียงพอ!');
        return;
    }

    item.qty -= qty;
    historyLogs.push({ time: now, action: 'OUT', itemName: item.name, qty: qty, customer: `งานลูกค้า: ${customer}` });
    saveData();
    document.getElementById('withdraw-form').reset();
    alert(`เบิกของให้ลูกค้า ${customer} เรียบร้อย!`);
});
</script>

</body>
</html>
