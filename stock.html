<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการสต๊อกและเครื่องมือ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .item-img { width: 50px; height: 50px; object-fit: cover; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container my-5">
    <h2 class="text-center mb-4">📦 ระบบจัดการสต๊อกวัสดุ & เครื่องมือ (แยกตามงานลูกค้า)</h2>
    
    <div class="row g-4">
        <div class="col-md-4">
            <div class="card p-4 mb-4">
                <h4 class="card-title text-success mb-3">➕ รับของเข้าสต๊อก / ลงทะเบียนของใหม่</h4>
                <form id="add-item-form">
                    <div class="mb-3">
                        <label class="form-label">ชื่อวัสดุ / เครื่องมือ</label>
                        <input type="text" id="add-name" class="form-control" required placeholder="เช่น สว่านไฟฟ้า, น็อต M6">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">ประเภท</label>
                        <select id="add-type" class="form-select">
                            <option value="วัสดุสิ้นเปลือง">วัสดุสิ้นเปลือง</option>
                            <option value="เครื่องมือ">เครื่องมือ/อุปกรณ์</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">จำนวนที่รับเข้า</label>
                        <input type="number" id="add-qty" class="form-control" min="1" value="1" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">รูปภาพสินค้า</label>
                        <input type="file" id="add-image" class="form-control" accept="image/*" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100">📥 บันทึกรับเข้าสต๊อก</button>
                </form>
            </div>

            <div class="card p-4">
                <h4 class="card-title text-danger mb-3">📤 เบิกวัสดุ/เครื่องมือ ไปใช้งาน</h4>
                <form id="withdraw-form">
                    <div class="mb-3">
                        <label class="form-label">เลือกของที่จะเบิก</label>
                        <select id="withdraw-item-id" class="form-select" required>
                            </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">จำนวนที่เบิก</label>
                        <input type="number" id="withdraw-qty" class="form-control" min="1" value="1" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">ชื่องาน / ลูกค้าที่นำไปใช้</label>
                        <input type="text" id="withdraw-customer" class="form-control" required placeholder="เช่น คุณสมชาย - หน้างานรามอินทรา">
                    </div>
                    <button type="submit" class="btn btn-danger w-100">📤 ยืนยันการเบิก</button>
                </form>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card p-4 mb-4">
                <h4 class="mb-3">📊 รายการสินค้าในคลังปัจจุบัน</h4>
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-dark">
                            <tr>
                                <th>รูปภาพ</th>
                                <th>ชื่อสินค้า</th>
                                <th>ประเภท</th>
                                <th>คงเหลือ</th>
                            </tr>
                        </thead>
                        <tbody id="stock-table-body">
                            </tbody>
                    </table>
                </div>
            </div>

            <div class="card p-4">
                <h4 class="mb-3 text-secondary">📜 ประวัติการทำรายการ (รับเข้า/เบิกไปใช้นานลูกค้า)</h4>
                <div class="table-responsive">
                    <table class="table table-sm table-striped">
                        <thead>
                            <tr>
                                <th>วัน-เวลา</th>
                                <th>ประเภท</th>
                                <th>รายการ</th>
                                <th>จำนวน</th>
                                <th>งานลูกค้า / หมายเหตุ</th>
                            </tr>
                        </thead>
                        <tbody id="history-table-body">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// === ระบบหลังบ้านจำลองด้วย JavaScript (localStorage) ===

// ดึงข้อมูลเก่าจากเครื่อง หรือถ้าไม่มีให้เป็นอาเรย์ว่าง
let stockItems = JSON.parse(localStorage.getItem('stockItems')) || [];
let historyLogs = JSON.parse(localStorage.getItem('historyLogs')) || [];

// ฟังก์ชันแปลงรูปภาพเป็น Base64 String เพื่อให้สามารถเซฟลงเครื่องได้โดยตรงไม่ต้องใช้ Server
function getBase64(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
    });
}

// 1. ฟังก์ชันแสดงผลตารางสต๊อกและอัปเดตตัวเลือกในฟอร์มเบิก
function renderStock() {
    const tableBody = document.getElementById('stock-table-body');
    const selectWithdraw = document.getElementById('withdraw-item-id');
    
    tableBody.innerHTML = '';
    selectWithdraw.innerHTML = '<option value="">-- เลือกของที่ต้องการเบิก --</option>';
    
    if(stockItems.length === 0) {
        tableBody.innerHTML = `<tr><td colspan="4" class="text-center text-muted">ยังไม่มีของในสต๊อก</td></tr>`;
    }

    stockItems.forEach(item => {
        // อัปเดตตารางคลังสินค้า
        tableBody.innerHTML += `
            <tr>
                <td><img src="${item.image}" class="item-img" alt="${item.name}"></td>
                <td><strong>${item.name}</strong></td>
                <td><span class="badge ${item.type === 'เครื่องมือ' ? 'bg-primary' : 'bg-info'}">${item.type}</span></td>
                <td><span class="fs-5 ${item.qty <= 0 ? 'text-danger' : 'text-success'}">${item.qty}</span></td>
            </tr>
        `;
        // อัปเดตเมนูตัวเลือกในฟอร์มเบิก (เบิกได้เฉพาะของที่มีในคลังมากกว่า 0)
        if(item.qty > 0) {
            selectWithdraw.innerHTML += `<option value="${item.id}">${item.name} (เหลือ: ${item.qty})</option>`;
        }
    });
}

// 2. ฟังก์ชันแสดงผลประวัติการรับเข้า-เบิกออก
function renderHistory() {
    const historyBody = document.getElementById('history-table-body');
    historyBody.innerHTML = '';
    
    if(historyLogs.length === 0) {
        historyBody.innerHTML = `<tr><td colspan="5" class="text-center text-muted">ยังไม่มีประวัติรายการ</td></tr>`;
    }

    // แสดงประวัติล่าสุดขึ้นก่อน (Reverse)
    [...historyLogs].reverse().forEach(log => {
        historyBody.innerHTML += `
            <tr>
                <td><small>${log.time}</small></td>
                <td><span class="badge ${log.action === 'IN' ? 'bg-success' : 'bg-danger'}">${log.action === 'IN' ? 'รับเข้า' : 'เบิกออก'}</span></td>
                <td>${log.itemName}</td>
                <td>${log.qty}</td>
                <td><span class="text-primary">${log.customer}</span></td>
            </tr>
        `;
    });
}

// 3. ฟังก์ชันเซฟข้อมูลลงคอมพิวเตอร์
function saveData() {
    localStorage.setItem('stockItems', JSON.stringify(stockItems));
    localStorage.setItem('historyLogs', JSON.stringify(historyLogs));
    renderStock();
    renderHistory();
}

// 4. เหตุการณ์ตอนกดปุ่ม "รับของเข้าสต๊อก"
document.getElementById('add-item-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const name = document.getElementById('add-name').value;
    const type = document.getElementById('add-type').value;
    const qty = parseInt(document.getElementById('add-qty').value);
    const imgFile = document.getElementById('add-image').files[0];
    
    const base64Img = await getBase64(imgFile);
    const now = new Date().toLocaleString('th-TH');

    // ตรวจสอบว่ามีของชื่อนี้อยู่แล้วหรือไม่ ถ้ามีให้บวกจำนวนเพิ่ม ถ้าไม่มีให้สร้างใหม่
    let existingItem = stockItems.find(item => item.name.toLowerCase() === name.toLowerCase());

    if(existingItem) {
        existingItem.qty += qty;
        existingItem.image = base64Img; // อัปเดตรูปใหม่ล่าสุด
    } else {
        stockItems.push({
            id: Date.now().toString(),
            name: name,
            type: type,
            qty: qty,
            image: base64Img
        });
    }

    // บันทึกประวัติ
    historyLogs.push({
        time: now,
        action: 'IN',
        itemName: name,
        qty: qty,
        customer: 'ซื้อเข้าคลังสินค้าทั่วไป'
    });

    saveData();
    document.getElementById('add-item-form').reset();
    alert('บันทึกรับของเข้าคลังเรียบร้อยครับ!');
});

// 5. เหตุการณ์ตอนกดปุ่ม "ยืนยันการเบิก"
document.getElementById('withdraw-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const itemId = document.getElementById('withdraw-item-id').value;
    const qty = parseInt(document.getElementById('withdraw-qty').value);
    const customer = document.getElementById('withdraw-customer').value;
    const now = new Date().toLocaleString('th-TH');

    const item = stockItems.find(i => i.id === itemId);
    
    if(!item) return;

    if(item.qty < qty) {
        alert('❌ ไม่สามารถเบิกได้เนื่องจากของในคลังมีไม่เพียงพอ!');
        return;
    }

    // หักลบจำนวนในคลัง
    item.qty -= qty;

    // บันทึกประวัติการเบิกผูกกับชื่อลูกค้า
    historyLogs.push({
        time: now,
        action: 'OUT',
        itemName: item.name,
        qty: qty,
        customer: `งานลูกค้า: ${customer}`
    });

    saveData();
    document.getElementById('withdraw-form').reset();
    alert(`เบิกของให้ลูกค้า ${customer} เรียบร้อย!`);
});

// รันแสดงผลครั้งแรกเมื่อเปิดหน้าเว็บ
renderStock();
renderHistory();
</script>

</body>
</html>
