<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3DNP Drafting | Architecture Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Prompt:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
</head>
<body>

    <div class="grid-bg" id="gridBg"></div>
    <div id="canvas-wrapper"><canvas id="draftCanvas"></canvas></div>

    <header class="top-nav">
        <div class="nav-left">
            <a href="../system.html" class="btn-back" title="Back to OS"><i class="fas fa-arrow-left"></i></a>
            <div class="menu-dropdown"><i class="fas fa-bars"></i></div>
            <div class="file-info">
                <span class="file-name">Project_Villa_01</span>
                <span class="file-status">Saved</span>
            </div>
        </div>
        <div class="nav-center">
            <button class="action-btn" title="Undo (Ctrl+Z)"><i class="fas fa-undo"></i></button>
            <button class="action-btn" title="Redo (Ctrl+Y)"><i class="fas fa-redo"></i></button>
        </div>
        <div class="nav-right">
            <button class="share-btn"><i class="fas fa-share-alt"></i> Share</button>
            <button class="export-btn"><i class="fas fa-download"></i> Export PDF</button>
        </div>
    </header>

    <aside class="left-toolbar">
        <div class="tool-group">
            <button class="tool-btn active" data-tool="select" title="Select (V)"><i class="fas fa-mouse-pointer"></i></button>
            <button class="tool-btn" data-tool="pan" title="Pan (H)"><i class="fas fa-hand-paper"></i></button>
        </div>
        <hr class="tool-divider">
        <div class="tool-group">
            <button class="tool-btn" data-tool="wall" title="Wall (W)"><i class="fas fa-slash"></i></button>
            <button class="tool-btn" data-tool="room" title="Room / Zone (R)"><i class="far fa-square"></i></button>
        </div>
        <hr class="tool-divider">
        <div class="tool-group">
            <button class="tool-btn" data-tool="door" title="Door (D)"><i class="fas fa-door-open"></i></button>
            <button class="tool-btn" data-tool="window" title="Window (O)"><i class="fas fa-border-all"></i></button>
        </div>
    </aside>

    <aside class="right-panel" id="propsPanel">
        <div class="panel-header">Properties</div>
        <div class="panel-content">
            <div class="prop-section">
                <div class="prop-title">Transform</div>
                <div class="input-grid">
                    <div class="input-wrap"><span class="label">X</span><input type="number" id="propX" value="0"></div>
                    <div class="input-wrap"><span class="label">Y</span><input type="number" id="propY" value="0"></div>
                    <div class="input-wrap"><span class="label">W</span><input type="number" id="propW" value="0"></div>
                    <div class="input-wrap"><span class="label">H</span><input type="number" id="propH" value="0"></div>
                    <div class="input-wrap"><span class="label"><i class="fas fa-sync-alt"></i></span><input type="number" id="propA" value="0"></div>
                </div>
            </div>
            <hr class="panel-divider">
            <button class="btn-delete" id="btnDelete"><i class="fas fa-trash"></i> Delete Element</button>
        </div>
    </aside>

    <footer class="bottom-bar">
        <div class="status-left"><span id="coordsDisplay">X: 0, Y: 0</span></div>
        <div class="status-right">
            <button class="status-btn"><i class="fas fa-magnet"></i> Snap to Grid</button>
            <span class="zoom-level" id="zoomDisplay">100%</span>
        </div>
    </footer>

    <script src="app_logic.js"></script>
</body>
</html>
